<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Постум — главные книги русской литературы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #f5f5f2;
            font-family: system-ui, -apple-system, 'Helvetica Neue', 'Roboto', 'Segoe UI', 'Arial', sans-serif;
            color: #1a1a1a;
            line-height: 1.3;
            padding: 0rem 1rem 2rem 1rem;
            position: relative;
        }
        
        /* Фоновое изображение - вариант 1: напрямую на body */
        body {
            background-image: url('https://i.imgur.com/9ZqJqYX.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* Полупрозрачный оверлей для читаемости */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(245, 245, 242, 0.8);
            z-index: 1;
            pointer-events: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        
        /* Если картинка не загрузится, показываем второй вариант */
        @supports not (background-image: url('https://i.imgur.com/9ZqJqYX.jpeg')) {
            body {
                background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23d4c5a9" width="100" height="100"/><circle fill="%23c4b599" cx="20" cy="20" r="15"/><circle fill="%23b4a589" cx="80" cy="50" r="25"/><circle fill="%23c4b599" cx="50" cy="80" r="20"/></svg>');
                background-size: cover;
            }
        }
        
        .nav-links {
            text-align: right;
            padding: 1rem 0;
            border-bottom: 1px solid #d4d4ce;
            margin-bottom: 1rem;
            background-color: rgba(245, 245, 242, 0.7);
            backdrop-filter: blur(5px);
        }
        .nav-link {
            display: inline-block;
            margin-left: 1.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5a5a55;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-link:hover {
            color: #1a1a1a;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .hero {
            text-align: center;
            margin: 0rem 0 2rem 0;
            padding: 3rem 1rem 2rem 1rem;
            border-bottom: 1px solid #d4d4ce;
            background-color: rgba(245, 245, 242, 0.6);
            backdrop-filter: blur(8px);
        }
        .main-title {
            font-family: 'Times New Roman', 'Georgia', serif;
            font-size: 150px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #1a1a1a;
            margin-bottom: 2.5rem;
            margin-top: 0.5rem;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }
        .poem-block {
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem;
            background: rgba(254, 254, 248, 0.9);
            border: 1px solid #e8e8e2;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        .poem-author {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            color: #7a7a75;
            margin-bottom: 1rem;
        }
        .poem-lines {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #2a2a27;
            white-space: pre-line;
            margin-bottom: 1.2rem;
        }
        .refresh-btn {
            background: none;
            border: 1px solid #c0c0b8;
            padding: 0.5rem 1.2rem;
            font-size: 0.75rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5a5a55;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .refresh-btn:hover {
            background: #e8e8e2;
            border-color: #8a8a85;
            color: #1a1a1a;
        }
        .specials {
            margin: 2rem 0 4rem 0;
        }
        .specials-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            color: #7a7a75;
            margin-bottom: 1rem;
        }
        .specials-grid {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .special-card {
            flex: 1;
            min-width: 280px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border: 1px solid #e3e3de;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .special-card:hover {
            border-color: #a0a09a;
            background: rgba(254, 254, 252, 0.95);
            transform: translateY(-2px);
        }
        .school-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #e3e3de;
            padding: 1.8rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .school-card:hover {
            border-color: #a0a09a;
            background: rgba(254, 254, 252, 0.95);
            transform: translateY(-2px);
        }
        .special-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a8a85;
            margin-bottom: 1rem;
        }
        .special-title {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }
        .special-desc {
            font-size: 0.85rem;
            color: #3a3a37;
            line-height: 1.4;
        }
        .philosophy-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .philosophy-title {
            font-family: 'Times New Roman', 'Georgia', serif;
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .philosophy-intro {
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #3a3a37;
        }
        .schools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }
        .school-period {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8a8a85;
            margin-bottom: 0.8rem;
        }
        .school-name {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            font-family: 'Times New Roman', serif;
        }
        .school-thinkers {
            font-size: 0.85rem;
            color: #5a5a55;
            margin-bottom: 1rem;
            font-style: italic;
        }
        .school-desc {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #2a2a27;
        }
        .school-page-header {
            margin-bottom: 2rem;
        }
        .school-page-title {
            font-family: 'Times New Roman', serif;
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .school-page-period {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8a8a85;
            margin-bottom: 1.5rem;
        }
        .video-container {
            margin: 2rem 0;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .thinker-card {
            background: rgba(254, 254, 248, 0.85);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-left: 4px solid #a0a09a;
        }
        .thinker-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            font-family: 'Times New Roman', serif;
        }
        .thinker-ideas {
            margin-top: 0.8rem;
            padding-left: 0;
            list-style: none;
            line-height: 1.5;
        }
        .thinker-ideas li {
            margin-bottom: 0.5rem;
            line-height: 1.4;
            padding-left: 1.2rem;
            text-indent: -1.2rem;
        }
        .thinker-ideas strong {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            color: #1a1a1a;
        }
        .back-link {
            display: inline-block;
            margin: 2rem 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5a5a55;
            text-decoration: none;
            cursor: pointer;
            border-bottom: 1px solid #d4d4ce;
            padding-bottom: 0.3rem;
        }
        .back-link:hover {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }
        .grid-books {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.8rem 2rem;
        }
        .book-card {
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
            padding-bottom: 0.5rem;
            background-color: rgba(245, 245, 242, 0.5);
            backdrop-filter: blur(5px);
        }
        .book-card:hover {
            border-bottom-color: #c0c0b8;
        }
        .author {
            font-size: 0.9rem;
            font-weight: 450;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #4a4a45;
            margin-bottom: 0.3rem;
        }
        .title {
            font-size: 1.6rem;
            font-weight: 650;
            line-height: 1.2;
            letter-spacing: -0.01em;
            color: #141413;
            margin-bottom: 0.25rem;
        }
        .site-footer {
            margin-top: 5rem;
            padding-top: 2rem;
            border-top: 1px solid #d4d4ce;
            font-size: 0.8rem;
            color: #6a6a65;
            text-align: left;
            background-color: rgba(245, 245, 242, 0.7);
            backdrop-filter: blur(5px);
        }
        @media (max-width: 700px) {
            body {
                padding: 0rem 0.5rem 1rem 0.5rem;
            }
            .main-title {
                font-size: 80px;
            }
            .philosophy-title, .school-page-title {
                font-size: 2rem;
            }
            .schools-grid {
                grid-template-columns: 1fr;
            }
            .school-name {
                font-size: 1.4rem;
            }
            .thinker-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Кнопка для ручной смены фона, если автоматический не работает -->
    <button onclick="setFallbackBackground()" style="position:fixed;bottom:20px;right:20px;z-index:9999;padding:8px 12px;background:rgba(0,0,0,0.5);color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;">🖼 Фон</button>
    
    <div class="nav-links">
        <a class="nav-link" onclick="showPage('main')">Главная</a>
        <a class="nav-link" onclick="showPage('philosophy')">История философии</a>
    </div>

    <!-- Остальной контент остаётся без изменений -->
    <div id="mainPage" class="page active">
        <div class="hero">
            <div class="main-title">Постум</div>
            <div class="poem-block" id="poemBlock">
                <div class="poem-author" id="poemAuthor">Анна Ахматова</div>
                <div class="poem-lines" id="poemLines">
                    Муза ушла по дороге,<br>
                    Осенней, узкой, крутой,<br>
                    И были черны ее ноги<br>
                    Крупной утренней росой.
                </div>
                <button class="refresh-btn" id="refreshPoemBtn">⟳ Другое стихотворение</button>
            </div>
        </div>

        <!-- Остальной HTML контент... -->
    </div>
</div>

<script>
    // Функция для установки запасного фона
    function setFallbackBackground() {
        const body = document.body;
        // Пробуем несколько вариантов фона
        const backgrounds = [
            'url("https://i.imgur.com/9ZqJqYX.jpeg")',
            'url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1920")',
            'linear-gradient(135deg, #d4c5a9, #c4b599, #b4a589)'
        ];
        
        const currentBg = body.style.backgroundImage;
        const currentIndex = backgrounds.findIndex(bg => currentBg.includes(bg.replace('url("','').replace('")','')));
        const nextIndex = (currentIndex + 1) % backgrounds.length;
        
        body.style.backgroundImage = backgrounds[nextIndex];
        body.style.backgroundSize = 'cover';
        body.style.backgroundPosition = 'center';
        body.style.backgroundAttachment = 'fixed';
        
        alert('Фон изменён! Если изображение не загрузилось, нажмите кнопку ещё раз.');
    }

    // Автоматическая проверка загрузки фона
    window.addEventListener('load', function() {
        const img = new Image();
        img.onload = function() {
            console.log('Фоновое изображение успешно загружено');
        };
        img.onerror = function() {
            console.log('Ошибка загрузки фонового изображения, использую градиент');
            document.body.style.backgroundImage = 'linear-gradient(135deg, #d4c5a9, #c4b599, #b4a589)';
            document.body.style.backgroundSize = 'cover';
        };
        img.src = 'https://i.imgur.com/9ZqJqYX.jpeg';
    });

    // Существующий JavaScript код...
    const philosophersData = [
        // ... все данные философов ...
    ];
    
    // Остальные функции...
</script>
</body>
</html>
